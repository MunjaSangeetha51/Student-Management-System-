<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add Student</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f7fc;
        }

        .form-box{
            width:500px;
            margin:auto;
            margin-top:60px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

    </style>

</head>

<body>

<div class="form-box">

    <h2 class="text-center mb-4">
        Add Student
    </h2>

    <form th:action="@{/saveStudent}"
          th:object="${student}"
          method="post">

        <input type="number"
               th:field="*{id}"
               class="form-control mb-3"
               placeholder="Enter ID">

        <input type="text"
               th:field="*{name}"
               class="form-control mb-3"
               placeholder="Enter Name">

        <input type="email"
               th:field="*{email}"
               class="form-control mb-3"
               placeholder="Enter Email">

        <input type="text"
               th:field="*{course}"
               class="form-control mb-3"
               placeholder="Enter Course">

        <input type="number"
               th:field="*{marks}"
               class="form-control mb-3"
               placeholder="Enter Marks">

        <button type="submit"
                class="btn btn-primary w-100">

            Save Student

        </button>

    </form>

</div>

</body>
</html>
