<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0d1b4b;
      --navy-light: #1a2d6d;
      --accent: #4f6ef7;
      --accent2: #f7c948;
      --bg: #f0f2fa;
      --card: #ffffff;
      --text: #0d1b4b;
      --muted: #7b85a6;
      --border: #d5daf0;
      --row-alt: #f5f7ff;
      --danger: #e74c5e;
      --success: #27ae60;
    }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 16px 80px;
    }

    .container {
      width: 100%;
      max-width: 900px;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .header {
      background: var(--navy);
      border-radius: 20px 20px 0 0;
      padding: 36px 40px 28px;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(79,110,247,.35) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header::after {
      content: '';
      position: absolute;
      bottom: -60px; left: 60px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(247,201,72,.18) 0%, transparent 70%);
      border-radius: 50%;
    }
    .header-inner { position: relative; z-index: 1; }
    .badge {
      display: inline-block;
      background: rgba(79,110,247,.22);
      color: #8fa8ff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
    }
    h1 {
      color: #fff;
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1.1;
    }
    h1 span { color: var(--accent2); }
    .subtitle {
      color: #8fa8ff;
      font-size: 14px;
      font-weight: 400;
      margin-top: 6px;
    }

    .card {
      background: var(--card);
      border-radius: 0 0 20px 20px;
      padding: 36px 40px 40px;
      box-shadow: 0 8px 40px rgba(13,27,75,.08);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 20px;
    }
    .form-grid .full { grid-column: 1 / -1; }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    input {
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      color: var(--text);
      background: var(--bg);
      border: 2px solid var(--border);
      border-radius: 10px;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,110,247,.12);
      background: #fff;
    }
    input::placeholder { color: #bbc3e0; }

    .btn-save {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--navy);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 13px 28px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 16px rgba(13,27,75,.2);
    }
    .btn-save:hover {
      background: var(--navy-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(13,27,75,.28);
    }
    .btn-save:active { transform: translateY(0); }
    .btn-save svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2.5; stroke-linecap: round; }

    .divider {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 32px 0 24px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .divider-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    #toast {
      position: fixed;
      bottom: 32px; right: 32px;
      background: var(--success);
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      opacity: 0;
      transform: translateY(12px);
      transition: opacity .3s, transform .3s;
      pointer-events: none;
      z-index: 999;
    }
    #toast.show { opacity: 1; transform: translateY(0); }

    .table-wrap {
      overflow-x: auto;
      border-radius: 14px;
      border: 2px solid var(--border);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    thead tr { background: var(--navy); }
    thead th {
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 14px 18px;
      text-align: left;
      white-space: nowrap;
    }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: var(--row-alt); }
    tbody tr:hover { background: #eaeffe; }
    tbody td {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--text);
      padding: 13px 18px;
      vertical-align: middle;
    }
    td.id-cell { font-weight: 700; color: var(--accent); }
    td.marks-cell { font-weight: 700; }
    .marks-high { color: var(--success); }
    .marks-mid  { color: #e6940a; }
    .marks-low  { color: var(--danger); }

    .btn-del {
      background: transparent;
      border: none;
      cursor: pointer;
      color: #c0c8e8;
      padding: 4px;
      border-radius: 6px;
      transition: color .2s, background .2s;
      display: inline-flex;
      align-items: center;
    }
    .btn-del:hover { color: var(--danger); background: #fdedf0; }
    .btn-del svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2.2; stroke-linecap: round; }

    .empty-row td {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .stat-chip {
      background: var(--row-alt);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      padding: 8px 16px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .stat-chip .val {
      font-size: 20px;
      font-weight: 800;
      color: var(--navy);
      line-height: 1;
    }
    .stat-chip .lbl {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--muted);
    }

    @media (max-width: 600px) {
      .header, .card { padding-left: 20px; padding-right: 20px; }
      .form-grid { grid-template-columns: 1fr; }
      .form-grid .full { grid-column: 1; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="header-inner">
      <div class="badge">📚 Academic Portal</div>
      <h1>Student <span>Management</span><br>System</h1>
      <p class="subtitle">Add, track and manage student records</p>
    </div>
  </div>

  <div class="card">
    <div class="form-grid">
      <div class="field">
        <label for="inp-name">Full Name</label>
        <input id="inp-name" type="text" placeholder="e.g. Sangeetha"/>
      </div>
      <div class="field">
        <label for="inp-email">Email Address</label>
        <input id="inp-email" type="email" placeholder="e.g. student@gmail.com"/>
      </div>
      <div class="field">
        <label for="inp-course">Course</label>
        <input id="inp-course" type="text" placeholder="e.g. Java Full Stack"/>
      </div>
      <div class="field">
        <label for="inp-marks">Marks</label>
        <input id="inp-marks" type="number" min="0" max="100" placeholder="0–100"/>
      </div>
    </div>

    <button class="btn-save" onclick="addStudent()">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Save Student
    </button>

    <div class="divider"><span class="divider-label">Student Records</span></div>

    <div class="stats" id="stats-row"></div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Email</th>
            <th>Course</th>
            <th>Marks</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div id="toast">✓ Student saved successfully!</div>

<script>
  const STORAGE_KEY = 'sms_students';

  let students = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  if (!students.length) {
    students = [
      { id: 1,  name: 'Sangeetha', email: 'sangeetha@gmail.com', course: 'Java',           marks: 95 },
      { id: 11, name: 'Janu',      email: 'Janu@gmail.com',      course: 'Java Full Stack', marks: 88 },
      { id: 12, name: 'Ram',       email: 'Ram@gmail.com',       course: 'Data Science',    marks: 92 },
      { id: 13, name: 'Sita',      email: 'Sita@gmail.com',      course: 'Cyber Security',  marks: 78 },
    ];
    save();
  }

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(students)); }
  function nextId() { return students.length ? Math.max(...students.map(s => s.id)) + 1 : 1; }
  function marksClass(m) {
    if (m >= 85) return 'marks-high';
    if (m >= 60) return 'marks-mid';
    return 'marks-low';
  }

  function render() {
    const tbody = document.getElementById('tbody');
    if (!students.length) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="6">No students yet. Add one above!</td></tr>';
    } else {
      tbody.innerHTML = students.map(s => `
        <tr>
          <td class="id-cell">${s.id}</td>
          <td>${s.name}</td>
          <td>${s.email}</td>
          <td>${s.course}</td>
          <td class="marks-cell ${marksClass(s.marks)}">${s.marks}</td>
          <td>
            <button class="btn-del" onclick="deleteStudent(${s.id})" title="Delete">
              <svg viewBox="0 0 24 24"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg>
            </button>
          </td>
        </tr>`).join('');
    }
    renderStats();
  }

  function renderStats() {
    const total = students.length;
    const avg = total ? Math.round(students.reduce((a,s) => a + s.marks, 0) / total) : 0;
    const top = total ? Math.max(...students.map(s => s.marks)) : 0;
    document.getElementById('stats-row').innerHTML = `
      <div class="stat-chip"><div class="val">${total}</div><div class="lbl">Students</div></div>
      <div class="stat-chip"><div class="val">${avg}</div><div class="lbl">Avg Marks</div></div>
      <div class="stat-chip"><div class="val">${top}</div><div class="lbl">Top Score</div></div>`;
  }

  function addStudent() {
    const name   = document.getElementById('inp-name').value.trim();
    const email  = document.getElementById('inp-email').value.trim();
    const course = document.getElementById('inp-course').value.trim();
    const marks  = parseInt(document.getElementById('inp-marks').value);

    if (!name || !email || !course || isNaN(marks)) {
      alert('Please fill in all fields correctly.');
      return;
    }

    students.push({ id: nextId(), name, email, course, marks });
    save();
    render();
    ['inp-name','inp-email','inp-course','inp-marks'].forEach(id => document.getElementById(id).value = '');
    showToast();
  }

  function deleteStudent(id) {
    students = students.filter(s => s.id !== id);
    save();
    render();
  }

  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  render();
</script>
</body>
</html>
